[colors]
background = #00000000
foreground = #cdd6f4
primary    = #89b4fa
yellow     = #f9e2af
red        = #f38ba8
green      = #a6e3a1
surface    = #1e1e2e
module-bg  = #aa1e1e2e

[bar/main]
enable-ipc = true
width = 100%
height = 32
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = JetBrainsMono Nerd Font Mono:size=11;2
font-1 = JetBrainsMono Nerd Font Mono:size=14;3
padding-left = 1
padding-right = 1
module-margin = 0
modules-left   = i3
modules-center = date
modules-right  = cpu memory disk pulseaudio battery bluetooth
separator = ""
wm-restack = i3

[module/i3]
type = internal/i3
format = <label-state>
label-focused = %index%
label-focused-foreground = ${colors.primary}
label-focused-background = ${colors.module-bg}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-foreground = #6c7086
label-unfocused-background = ${colors.module-bg}
label-unfocused-padding = 1
label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-background = ${colors.module-bg}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = %d/%m/%Y
time = %H:%M
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.module-bg}
format-padding = 1
label = %date%  %time%

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.module-bg}
format-padding = 1
label = %percentage%%

[module/memory]
type = internal/memory
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.module-bg}
format-padding = 1
label = %used%

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.module-bg}
format-padding = 1
label-mounted = %free%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.primary}
format-volume-background = ${colors.module-bg}
format-volume-padding = 1
label-volume = %percentage%%
label-muted =  muted
label-muted-foreground = #6c7086
label-muted-background = ${colors.module-bg}
label-muted-padding = 1

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100
format-charging = <animation-charging> <label-charging>
format-charging-background = ${colors.module-bg}
format-charging-padding = 1
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.module-bg}
format-discharging-padding = 1
format-full-prefix = " "
format-full-prefix-foreground = ${colors.green}
format-full-background = ${colors.module-bg}
format-full-padding = 1
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = 100%
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.yellow}
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

[module/bluetooth]
type = custom/script
exec = bluetoothctl show | grep -q "Powered: yes" && echo "󰂯" || echo "󰂲"
interval = 5
format-prefix-foreground = ${colors.primary}
format-background = ${colors.module-bg}
format-padding = 1
click-left = blueman-manager
