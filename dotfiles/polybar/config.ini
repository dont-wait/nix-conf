[colors]
background = #00000000
foreground = #cdd6f4
primary    = #89b4fa
yellow     = #f9e2af
red        = #f38ba8
green      = #a6e3a1
module-bg  = #cc1e1e2e

[bar/main]
monitor = ${env:MONITOR:}
width = 96%
height = 32
offset-x = 2%
offset-y = 10
radius = 12
override-redirect = true
wm-restack = i3
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = JetBrainsMono Nerd Font Mono:size=11;2
font-1 = JetBrainsMono Nerd Font Mono:size=14;3
padding-left = 0
padding-right = 0
module-margin = 1
modules-left   = i3
modules-center = date
modules-right  = cpu memory disk pulseaudio battery bluetooth

[module/i3]
type = internal/i3
format = <label-state>
label-focused = %index%
label-focused-foreground = ${colors.primary}
label-focused-background = ${colors.module-bg}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-foreground = #6c7086
label-unfocused-background = ${colors.module-bg}
label-unfocused-padding = 1
label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-background = ${colors.module-bg}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = %d/%m/%Y
time = %H:%M
format = <label>
format-prefix = "î‚¶"
format-suffix = "î‚´"
format-prefix-foreground = ${colors.module-bg}
format-suffix-foreground = ${colors.module-bg}
label = %{B#cc1e1e2e} ï„³ %date% %time% 
label-background = ${colors.module-bg}

[module/cpu]
type = internal/cpu
interval = 3
format = <label>
format-prefix = "î‚¶"
format-suffix = "î‚´"
format-prefix-foreground = ${colors.module-bg}
format-suffix-foreground = ${colors.module-bg}
label = %{B#cc1e1e2e} ï’¼ %percentage%% 
label-background = ${colors.module-bg}

[module/memory]
type = internal/memory
interval = 5
format = <label>
format-prefix = "î‚¶"
format-suffix = "î‚´"
format-prefix-foreground = ${colors.module-bg}
format-suffix-foreground = ${colors.module-bg}
label = %{B#cc1e1e2e} َ°کڑ %used% 
label-background = ${colors.module-bg}

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
format-mounted = <label-mounted>
format-mounted-prefix = "î‚¶"
format-mounted-suffix = "î‚´"
format-mounted-prefix-foreground = ${colors.module-bg}
format-mounted-suffix-foreground = ${colors.module-bg}
label-mounted = %{B#cc1e1e2e} ï‚  %free% 
label-mounted-background = ${colors.module-bg}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = "î‚¶"
format-volume-suffix = "î‚´"
format-volume-prefix-foreground = ${colors.module-bg}
format-volume-suffix-foreground = ${colors.module-bg}
label-volume = %{B#cc1e1e2e} ï€¨ %percentage%% 
label-volume-background = ${colors.module-bg}
label-muted = %{B#cc1e1e2e} َ°‌ں muted 
label-muted-background = ${colors.module-bg}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100
format-charging = <animation-charging> <label-charging>
format-charging-background = ${colors.module-bg}
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.module-bg}
format-full = <label-full>
format-full-prefix = " َ°پ¹ "
format-full-background = ${colors.module-bg}
label-charging = %percentage%% 
label-discharging = %percentage%% 
label-full = 100% 
ramp-capacity-0 = َ°پ؛
ramp-capacity-1 = َ°پ»
ramp-capacity-2 = َ°پ½
ramp-capacity-3 = َ°پ؟
ramp-capacity-4 = َ°‚پ
ramp-capacity-foreground = ${colors.yellow}
animation-charging-0 = َ°¢œ
animation-charging-1 = َ°‚†
animation-charging-2 = َ°‚‡
animation-charging-3 = َ°‚ˆ
animation-charging-4 = َ°‚‰
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

[module/bluetooth]
type = custom/script
exec = bluetoothctl show | grep -q "Powered: yes" && echo " ïٹ” " || echo " َ°‚² "
interval = 5
format-foreground = ${colors.primary}
format-background = ${colors.module-bg}
format-prefix = "î‚¶"
format-suffix = "î‚´"
format-prefix-foreground = ${colors.module-bg}
format-suffix-foreground = ${colors.module-bg}
click-left = blueman-manager
